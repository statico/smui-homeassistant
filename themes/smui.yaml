##
## SMUI Theme for Home Assistant
## A terminal-aesthetic theme inspired by Nord and starship bridge terminals.
## https://github.com/statico/smui-homeassistant
##

SMUI:
  # ── Typography (JetBrains Mono) ───────────────────────────────
  # Requires adding the Google Font as a Lovelace resource:
  #   URL:  https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap
  #   Type: Stylesheet
  primary-font-family: "'JetBrains Mono', monospace"
  ha-card-header-font-family: "var(--primary-font-family)"
  ha-font-family-body: "var(--primary-font-family)"
  ha-font-family-heading: "var(--primary-font-family)"
  ha-font-family-longform: "var(--primary-font-family)"
  mdc-typography-font-family: "var(--primary-font-family)"
  mdc-typography-button-font-family: "var(--primary-font-family)"
  mdc-typography-headline6-font-family: "var(--primary-font-family)"
  mdc-typography-body1-font-family: "var(--primary-font-family)"
  mdc-typography-subtitle1-font-family: "var(--primary-font-family)"
  md-ref-typeface-plain: "var(--primary-font-family)"
  paper-font-common-base_-_font-family: "var(--primary-font-family)"
  paper-font-body1_-_font-family: "var(--primary-font-family)"
  paper-font-subhead_-_font-family: "var(--primary-font-family)"
  paper-font-headline_-_font-family: "var(--primary-font-family)"
  paper-font-caption_-_font-family: "var(--primary-font-family)"
  paper-font-title_-_font-family: "var(--primary-font-family)"
  paper-font-common-code_-_font-family: "var(--primary-font-family)"

  # ── Compact Layout (card-mod required) ────────────────────────
  card-mod-theme: SMUI
  card-mod-card: |
    ha-card {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px;
    }
    ha-card .card-header {
      padding: 6px 10px !important;
      font-size: 12px !important;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    ha-card .card-content {
      padding: 6px 10px !important;
    }
    ha-card .card-actions {
      padding: 2px 6px !important;
    }
  card-mod-root: |
    ha-app-layout {
      font-family: 'JetBrains Mono', monospace !important;
    }
    .header {
      font-family: 'JetBrains Mono', monospace !important;
      --header-height: 46px !important;
    }
    app-toolbar {
      height: 46px !important;
      font-size: 12px !important;
    }
  card-mod-sidebar: |
    :host {
      font-family: 'JetBrains Mono', monospace !important;
    }
    .menu .title {
      font-size: 12px !important;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    paper-icon-item {
      height: 38px !important;
    }
  card-mod-more-info: |
    :host {
      font-family: 'JetBrains Mono', monospace !important;
    }
    ha-dialog .content {
      padding: 6px 14px !important;
    }
  card-mod-row: |
    :host {
      font-family: 'JetBrains Mono', monospace !important;
    }
  card-mod-view: |
    ha-panel-lovelace {
      font-family: 'JetBrains Mono', monospace !important;
    }

  # ── Dropdown Menus, Selects, Lists (MD3) ──────────────────────
  # Targets md-item, md-menu, ha-md-select, ha-select, ha-list etc.
  card-mod-more-info-yaml: |
    .: |
      /* MD3 menu container */
      md-menu, ha-md-menu {
        --md-menu-container-color: var(--card-background-color) !important;
        --md-menu-container-shape: 0px !important;
        --md-menu-container-shadow-color: transparent !important;
        font-family: 'JetBrains Mono', monospace !important;
      }
      /* MD3 menu items */
      md-menu-item, md-item, ha-md-menu-item {
        --md-menu-item-container-color: var(--card-background-color) !important;
        --md-menu-item-label-text-font: 'JetBrains Mono', monospace !important;
        --md-menu-item-label-text-size: 11px !important;
        --md-menu-item-top-space: 2px !important;
        --md-menu-item-bottom-space: 2px !important;
        --md-menu-item-one-line-container-height: 34px !important;
        --md-menu-item-label-text-color: var(--primary-text-color) !important;
        --md-ripple-hover-color: var(--primary-color) !important;
        --md-ripple-hover-opacity: 0.1 !important;
        font-family: 'JetBrains Mono', monospace !important;
        font-size: 11px !important;
        border-radius: 0px !important;
      }
      /* MD3 select */
      ha-md-select, md-filled-select, md-outlined-select {
        --md-filled-select-text-field-container-color: var(--secondary-background-color) !important;
        --md-filled-select-text-field-container-shape: 0px !important;
        --md-filled-select-text-field-input-text-font: 'JetBrains Mono', monospace !important;
        --md-filled-select-text-field-input-text-size: 11px !important;
        --md-filled-select-text-field-label-text-font: 'JetBrains Mono', monospace !important;
        --md-outlined-select-text-field-container-shape: 0px !important;
        --md-outlined-select-text-field-input-text-font: 'JetBrains Mono', monospace !important;
        --md-sys-color-primary: var(--primary-color) !important;
        font-family: 'JetBrains Mono', monospace !important;
        border-radius: 0px !important;
      }
      /* Legacy selects */
      ha-select {
        --mdc-shape-small: 0px !important;
        --mdc-select-fill-color: var(--secondary-background-color) !important;
        --mdc-select-ink-color: var(--primary-text-color) !important;
        --mdc-select-label-ink-color: var(--secondary-text-color) !important;
        --mdc-select-idle-line-color: var(--divider-color) !important;
        --mdc-select-dropdown-icon-color: var(--secondary-text-color) !important;
        --mdc-select-hover-line-color: var(--outline-hover-color) !important;
        font-family: 'JetBrains Mono', monospace !important;
      }
      /* MDC list items */
      mwc-list-item, ha-list-item {
        --mdc-typography-body2-font-family: 'JetBrains Mono', monospace !important;
        --mdc-list-side-padding: 10px !important;
        --mdc-list-item-meta-size: 11px !important;
        font-family: 'JetBrains Mono', monospace !important;
        font-size: 11px !important;
        height: 38px !important;
      }
      /* MD3 focus ring -- square, not rounded */
      md-focus-ring {
        --md-focus-ring-shape: 0px !important;
      }
      /* MD3 ripple */
      ha-ripple, md-ripple {
        --md-ripple-hover-color: var(--primary-color) !important;
        --md-ripple-pressed-color: var(--primary-color) !important;
      }
  card-mod-root-yaml: |
    .: |
      /* MD3 menus in toolbar/header area */
      md-menu, ha-md-menu {
        --md-menu-container-color: var(--card-background-color) !important;
        --md-menu-container-shape: 0px !important;
        --md-menu-container-shadow-color: transparent !important;
      }
      md-menu-item, md-item, ha-md-menu-item {
        --md-menu-item-container-color: var(--card-background-color) !important;
        --md-menu-item-label-text-font: 'JetBrains Mono', monospace !important;
        --md-menu-item-label-text-size: 11px !important;
        --md-menu-item-top-space: 2px !important;
        --md-menu-item-bottom-space: 2px !important;
        --md-menu-item-one-line-container-height: 34px !important;
        --md-menu-item-label-text-color: var(--primary-text-color) !important;
        font-family: 'JetBrains Mono', monospace !important;
        font-size: 11px !important;
        border-radius: 0px !important;
      }
      ha-md-select, md-filled-select, md-outlined-select {
        --md-filled-select-text-field-container-shape: 0px !important;
        --md-outlined-select-text-field-container-shape: 0px !important;
        font-family: 'JetBrains Mono', monospace !important;
        border-radius: 0px !important;
      }
      ha-select {
        --mdc-shape-small: 0px !important;
        font-family: 'JetBrains Mono', monospace !important;
      }
      mwc-list-item, ha-list-item {
        font-family: 'JetBrains Mono', monospace !important;
        font-size: 11px !important;
        height: 38px !important;
      }
      md-focus-ring {
        --md-focus-ring-shape: 0px !important;
      }

